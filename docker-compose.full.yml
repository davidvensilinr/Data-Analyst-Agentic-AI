version: '3.9'

services:
  # Frontend - Next.js React App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataanalyst-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dataanalyst-network
    restart: unless-stopped

  # Autonomous Data Analyst Backend - FastAPI
  backend:
    build:
      context: ./autonomous_data_analyst
      dockerfile: Dockerfile
    container_name: dataanalyst-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/analyst.db
      - DEBUG=true
      - MOCK_LLM_MODE=true
      - UPLOAD_DIR=./data/uploads
      - PROCESSED_DIR=./data/processed
      - SECRET_KEY=dev-secret-key-change-in-production
      - REQUIRE_HUMAN_APPROVAL=false
      - READ_ONLY_MODE=false
      - SANITIZE_LOGS=true
      - MAX_FILE_SIZE=104857600
      - MAX_QUERY_ROWS=100000
      - WS_HEARTBEAT_INTERVAL=30
      - WS_MAX_CONNECTIONS=100
    volumes:
      - ./autonomous_data_analyst/data:/app/data
      - ./autonomous_data_analyst/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dataanalyst-network
    restart: unless-stopped

  # Optional: PostgreSQL for production database
  postgres:
    image: postgres:15-alpine
    container_name: dataanalyst-postgres
    environment:
      - POSTGRES_DB=analyst_db
      - POSTGRES_USER=analyst_user
      - POSTGRES_PASSWORD=analyst_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./autonomous_data_analyst/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    networks:
      - dataanalyst-network
    restart: unless-stopped
    profiles:
      - production

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: dataanalyst-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dataanalyst-network
    restart: unless-stopped
    profiles:
      - production

  # Optional: Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: dataanalyst-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./autonomous_data_analyst/config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - dataanalyst-network
    restart: unless-stopped
    profiles:
      - monitoring

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: dataanalyst-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./autonomous_data_analyst/config/grafana:/etc/grafana/provisioning
    networks:
      - dataanalyst-network
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  dataanalyst-network:
    driver: bridge

# Usage:
#
# Development (with SQLite backend):
#   docker-compose -f docker-compose.full.yml up -d
#
# Production (with PostgreSQL):
#   docker-compose -f docker-compose.full.yml --profile production up -d
#
# With monitoring:
#   docker-compose -f docker-compose.full.yml --profile monitoring up -d
#
# Full production setup:
#   docker-compose -f docker-compose.full.yml --profile production --profile monitoring up -d
#
# View logs:
#   docker-compose -f docker-compose.full.yml logs -f
#   docker-compose -f docker-compose.full.yml logs -f backend
#
# Stop services:
#   docker-compose -f docker-compose.full.yml down
#
# Clean up everything:
#   docker-compose -f docker-compose.full.yml down -v
#
# Access:
#   Frontend: http://localhost:3000
#   Backend API: http://localhost:8000
#   Backend Docs: http://localhost:8000/docs
#   Backend Health: http://localhost:8000/health
#   Grafana: http://localhost:3001 (admin/admin) - if monitoring enabled
#   Prometheus: http://localhost:9090 - if monitoring enabled
